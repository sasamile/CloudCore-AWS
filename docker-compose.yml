services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zyncloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zyncloud}
      POSTGRES_DB: ${POSTGRES_DB:-zyncloud}
    volumes:
      - zyncloud-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zyncloud} -d ${POSTGRES_DB:-zyncloud}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"

  zyncloud:
    image: ${ZYNCLOUD_IMAGE:-zyncloud/app:local}
    build:
      context: .
      dockerfile: Dockerfile.app
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        NEXT_PUBLIC_PUBLIC_HOST: ${NEXT_PUBLIC_PUBLIC_HOST:-localhost}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
      - "${API_PORT:-4000}:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - zyncloud-backups:/var/lib/zyncloud/backups
      - zyncloud-storage:/var/lib/zyncloud/storage
      - ${CLOUDFLARED_CONFIG_PATH:-/etc/cloudflared/config.yml}:/etc/cloudflared/config.yml
      - ${CLOUDFLARED_BIN_HOST:-/usr/bin/cloudflared}:/usr/bin/cloudflared:ro
      - ${CLOUDFLARE_TUNNEL_CREDENTIALS_DIR:-/home/alfred/.cloudflared}:/root/.cloudflared:ro
      - ./secrets:/run/secrets/zyncloud:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zyncloud}:${POSTGRES_PASSWORD:-zyncloud}@db:5432/${POSTGRES_DB:-zyncloud}
      JWT_SECRET: ${JWT_SECRET:-zyncloud-production-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      BACKUP_DIR: /var/lib/zyncloud/backups
      STORAGE_DIR: /var/lib/zyncloud/storage
      ROUTING_MODE: ${ROUTING_MODE:-tunnel}
      BASE_DOMAIN: ${BASE_DOMAIN:-}
      TUNNEL_WEB_HOST: ${TUNNEL_WEB_HOST:-}
      TUNNEL_API_HOST: ${TUNNEL_API_HOST:-}
      ZYNAUTH_ISSUER: ${ZYNAUTH_ISSUER:-}
      CLOUDFLARED_CONFIG_PATH: ${CLOUDFLARED_CONFIG_PATH:-/etc/cloudflared/config.yml}
      CLOUDFLARE_TUNNEL_ID: ${CLOUDFLARE_TUNNEL_ID:-}
      CLOUDFLARE_TUNNEL_NAME: ${CLOUDFLARE_TUNNEL_NAME:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_TUNNEL_CREDENTIALS: ${CLOUDFLARE_TUNNEL_CREDENTIALS:-}
      CLOUDFLARED_BIN: ${CLOUDFLARED_BIN:-/usr/bin/cloudflared}
      CLOUDFLARED_RESTART_CMD: ${CLOUDFLARED_RESTART_CMD:-}
      WEB_PORT: ${WEB_PORT:-3000}
      API_PORT: ${API_PORT:-4000}
      UBUNTU_BASE_IMAGE: ${UBUNTU_BASE_IMAGE:-zyncloud/ubuntu-base:latest}
      HOST_CONSOLE_ENABLED: ${HOST_CONSOLE_ENABLED:-false}
      HOST_CONSOLE_MODE: ${HOST_CONSOLE_MODE:-ssh}
      HOST_CONSOLE_SSH_HOST: ${HOST_CONSOLE_SSH_HOST:-host.docker.internal}
      HOST_CONSOLE_SSH_PORT: ${HOST_CONSOLE_SSH_PORT:-22}
      HOST_CONSOLE_SSH_USER: ${HOST_CONSOLE_SSH_USER:-}
      HOST_CONSOLE_SSH_KEY_PATH: /run/secrets/zyncloud/host_console_key
      HOST_CONSOLE_LABEL: ${HOST_CONSOLE_LABEL:-ZynCloud Server}
      TUNNEL_USE_SSH: ${TUNNEL_USE_SSH:-true}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:-}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:-}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI:-}
      GITHUB_OAUTH_STATE_SECRET: ${GITHUB_OAUTH_STATE_SECRET:-}
      GITHUB_OAUTH_SCOPES: ${GITHUB_OAUTH_SCOPES:-repo read:user}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      GOOGLE_OAUTH_REDIRECT_URI: ${GOOGLE_OAUTH_REDIRECT_URI:-}
      GOOGLE_OAUTH_STATE_SECRET: ${GOOGLE_OAUTH_STATE_SECRET:-}
      GOOGLE_OAUTH_SCOPES: ${GOOGLE_OAUTH_SCOPES:-openid email profile}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      INTEGRATION_ENCRYPTION_SECRET: ${INTEGRATION_ENCRYPTION_SECRET:-}
    restart: unless-stopped

volumes:
  zyncloud-db-data:
  zyncloud-backups:
  zyncloud-storage:
