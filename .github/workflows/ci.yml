name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
        env:
          DATABASE_URL: postgresql://zyncloud:zyncloud@localhost:5432/zyncloud

      - name: Build
        run: npm run build
