name: Deploy to PC vieja

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/cloudcore-aws/app
  UBUNTU_IMAGE: ghcr.io/${{ github.repository_owner }}/cloudcore-aws/ubuntu-base
  NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
  NEXT_PUBLIC_PUBLIC_HOST: ${{ vars.NEXT_PUBLIC_PUBLIC_HOST || 'localhost' }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: cd apps/api && npx prisma generate
        env:
          DATABASE_URL: postgresql://zyncloud:zyncloud@localhost:5432/zyncloud

      - name: Build
        run: npm run build

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:latest
            ${{ env.APP_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_PUBLIC_HOST=${{ env.NEXT_PUBLIC_PUBLIC_HOST }}

      - name: Build and push ubuntu-base image
        uses: docker/build-push-action@v6
        with:
          context: docker/ubuntu-base
          push: true
          tags: |
            ${{ env.UBUNTU_IMAGE }}:latest
            ${{ env.UBUNTU_IMAGE }}:${{ github.sha }}

  deploy:
    needs: publish
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verificar .env
        run: |
          if [ ! -f .env ]; then
            echo "::error::No existe .env en el runner. Crea el archivo en la PC vieja:"
            echo "  cp .env.example .env && nano .env"
            exit 1
          fi

      - name: Deploy
        run: bash scripts/deploy.sh
        env:
          ZYNCLOUD_IMAGE: ${{ env.APP_IMAGE }}:latest
          UBUNTU_BASE_IMAGE: ${{ env.UBUNTU_IMAGE }}:latest
